<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ducktape — Deaf Duck</title>
<style>
  :root{ --ink:#1b2a2f; --paper:#eef6f3; --pond:#0f5c6b; --pond-deep:#0a3f49; --gold:#f2c14e; --alert:#ff5c5c; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#0a1c1f;color:var(--paper);
    font-family:'Trebuchet MS',ui-rounded,'Segoe UI',sans-serif;overflow:hidden;}
  #topbar{position:fixed;top:0;left:0;right:0;height:56px;z-index:20;
    display:flex;align-items:center;justify-content:space-between;padding:0 16px;
    background:var(--pond-deep);border-bottom:2px solid var(--gold);}
  #timer{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;}
  #timer.low{color:var(--alert);}
  #role{font-weight:700;letter-spacing:1px;font-size:14px;}
  #stage{position:absolute;top:56px;left:0;right:0;bottom:120px;}
  canvas{display:block;width:100%;height:100%;}
  #hud{position:fixed;bottom:0;left:0;right:0;height:120px;background:rgba(10,25,28,.9);
    border-top:2px solid var(--gold);padding:10px 16px;z-index:20;display:flex;flex-direction:column;gap:6px;}
  #hud h4{margin:0;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;opacity:.65;}
  #symLog{font-size:13px;line-height:1.4;max-height:70px;overflow:auto;}
  .sym-row{display:flex;gap:8px;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.08);}
  .sym-icon{font-size:16px;}
  #resultOverlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
    background:rgba(5,10,11,.9);}
  #resultOverlay .card{background:linear-gradient(180deg,#123338,#0a1c1f);border:2px solid var(--gold);
    border-radius:18px;padding:36px 40px;text-align:center;max-width:380px;}
  #resultOverlay button{margin-top:16px;background:var(--gold);color:var(--ink);border:none;
    font-weight:800;padding:10px 22px;border-radius:30px;cursor:pointer;}
</style>
</head>
<body>
<div id="topbar">
  <div id="role">🙉 DEAF DUCK — full sight, no sound</div>
  <div id="timer">02:00</div>
</div>

<div id="stage"><canvas id="cv"></canvas></div>

<div id="hud">
  <h4>Drag to look, WASD to walk. You see shapes the mute duck places — call out which shape and roughly where, so blind duck can find it. Only mute knows what each shape's digit is.</h4>
  <div id="symLog">No symbols placed yet.</div>
</div>

<div id="resultOverlay">
  <div class="card">
    <h2 id="resultTitle">Time's Up!</h2>
    <p id="resultText"></p>
    <button onclick="location.href='./index.html'">Back to Lobby</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/loaders/GLTFLoader.js"></script>
<script type="module">
import { roomRef, onValue, update, authReady } from "./shared/firebase.js";
import { loadDuck } from "./shared/duck.js";
import { createFirstPersonRig, hideFromOwnCamera } from "./shared/firstPerson.js";

const params = new URLSearchParams(location.search);
const ROOM = params.get("room");
if (!ROOM) document.getElementById("symLog").textContent = "No room code in URL — go back to lobby.";
await authReady;

// ---------------- Full-color scene (this is the only client that sees normally) ----------------
const canvas = document.getElementById("cv");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x163b3f);
const camera = new THREE.PerspectiveCamera(70, 1, 0.1, 100);

scene.add(new THREE.HemisphereLight(0xbfe9ff, 0x142b2e, 1.1));
const dir = new THREE.DirectionalLight(0xffffff, 0.9);
dir.position.set(3, 6, 2);
scene.add(dir);

const floorMat = new THREE.MeshStandardMaterial({ color: 0x24443f, flatShading: true, roughness: 0.9 });
const floor = new THREE.Mesh(new THREE.BoxGeometry(10, 0.2, 10), floorMat);
floor.position.y = -0.5;
scene.add(floor);

const wallMat = new THREE.MeshStandardMaterial({ color: 0x1b3d3f, flatShading: true, roughness: 0.9 });
[[0, 1, -5, 10, 3, 0.2], [-5, 1, 0, 0.2, 3, 10], [5, 1, 0, 0.2, 3, 10]].forEach(([x, y, z, w, h, d]) => {
  const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
  wall.position.set(x, y, z);
  scene.add(wall);
});

// Visible keypad on the back wall — same physical spot Blind is feeling for.
const keypadMat = new THREE.MeshStandardMaterial({ color: 0xf2c14e, flatShading: true });
const keypad = new THREE.Mesh(new THREE.BoxGeometry(1.1, 1.4, 0.08), keypadMat);
keypad.position.set(0, 1.1, -4.85);
scene.add(keypad);

let duckGroup = new THREE.Group();
scene.add(duckGroup);
loadDuck(0x7fd9ff, ({ group }) => {
  scene.remove(duckGroup);
  duckGroup = group;
  duckGroup.position.set(0, 0, 3);
  scene.add(duckGroup);
  hideFromOwnCamera(camera, duckGroup);
});

function resize() {
  const r = canvas.getBoundingClientRect();
  renderer.setSize(r.width, r.height, false);
  camera.aspect = r.width / r.height;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);
resize();

// First-person rig: drag to look, WASD/arrows to move relative to view.
const rig = createFirstPersonRig(camera, canvas, { bounds: 4.5 });

// ---------------- Live symbols placed by the mute duck ----------------
const SHAPE_ICON = { circle: "⭕", triangle: "🔺", square: "⬛", zigzag: "⚡" };
const shapeMeshes = [];

function makeSymbolMesh(shape) {
  let geo, color;
  if (shape === "circle") { geo = new THREE.TorusGeometry(0.4, 0.08, 8, 16); color = 0xffcf4a; }
  else if (shape === "triangle") { geo = new THREE.ConeGeometry(0.45, 0.3, 3); color = 0xff9d3d; }
  else if (shape === "square") { geo = new THREE.BoxGeometry(0.6, 0.6, 0.1); color = 0x7fd9ff; }
  else { geo = new THREE.TorusKnotGeometry(0.3, 0.06, 32, 4); color = 0xff5c5c; }
  return new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color, flatShading: true }));
}

onValue(roomRef(ROOM, "symbols", "current"), snap => {
  const data = snap.val();
  if (!data) return;
  const mesh = makeSymbolMesh(data.shape);
  mesh.position.set(data.worldX, 0.4, data.worldZ);
  scene.add(mesh);
  shapeMeshes.push(mesh);

  const log = document.getElementById("symLog");
  if (log.textContent === "No symbols placed yet.") log.textContent = "";
  const row = document.createElement("div");
  row.className = "sym-row";
  row.innerHTML = `<span class="sym-icon">${SHAPE_ICON[data.shape] || "❔"}</span> ${data.shape} placed near x=${data.worldX.toFixed(1)}, z=${data.worldZ.toFixed(1)}`;
  log.prepend(row);
});

// ---------------- Timer ----------------
const timerEl = document.getElementById("timer");
let duration = 120, startedAt = null, status = "waiting";

onValue(roomRef(ROOM), snap => {
  const data = snap.val();
  if (!data) return;
  duration = data.duration || 120;
  startedAt = data.startedAt || null;
  status = data.status || "waiting";
  if (status === "won") endGame(true);
  if (status === "lost") endGame(false);
});

setInterval(() => {
  if (!startedAt || status !== "playing") return;
  const elapsed = Math.floor((Date.now() - startedAt) / 1000);
  const left = Math.max(duration - elapsed, 0);
  timerEl.textContent = fmt(left);
  timerEl.classList.toggle("low", left <= 20);
  if (left <= 0 && status === "playing") {
    update(roomRef(ROOM), { status: "lost" });
  }
}, 250);

function fmt(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
}

function endGame(won) {
  const overlay = document.getElementById("resultOverlay");
  overlay.style.display = "flex";
  document.getElementById("resultTitle").textContent = won ? "Room Cleared! 🎉" : "Time's Up!";
  document.getElementById("resultText").textContent = won
    ? "The door opened. Great teamwork."
    : "The door stayed shut. Coordinate faster next time.";
}

function animate() {
  const state = rig.update(0.06);
  duckGroup.position.set(state.pos.x, 0, state.pos.z);
  if (rig.isMoving()) duckGroup.rotation.y = state.moveYaw;
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
